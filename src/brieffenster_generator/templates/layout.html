<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brieffenster-Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #222;
            text-align: center;
            font-weight: 600;
        }

        form {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .fieldsets-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        fieldset {
            border: none;
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        fieldset:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        legend {
            font-size: 1.2rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 1.5rem;
            display: block;
        }

        p {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column-reverse;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #666;
            margin-bottom: 0.5rem;
            display: block;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        input[type="text"]::placeholder {
            color: #999;
        }

        .buttons-container {
            display: flex;
            gap: 0.75rem;
        }

        button {
            padding: 0.875rem 1.5rem;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-family: inherit;
        }

        button[type="submit"] {
            flex: 1;
            background-color: #0066cc;
        }

        button[type="submit"]:hover {
            background-color: #0052a3;
        }

        .demo-button {
            flex: 0 0 auto;
            width: auto;
            padding: 0.875rem 1rem;
            background-color: #999;
            min-width: fit-content;
        }

        .demo-button:hover {
            background-color: #777;
        }

        button:active {
            transform: scale(0.98);
        }

        button:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.3);
        }

        @media (max-width: 800px) {
            .fieldsets-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            form {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .fieldsets-container {
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>

{% block body %}{% endblock %}

</body>
</html>
